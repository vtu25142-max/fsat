<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>Colour Palette</h1>
    <div class="palette-container">
        <div class="palette-swatch">
            <div class="swatch-color swatch-sky"></div>
            <div class="swatch-label">Sky Blue<div class="swatch-hex">#a8d0e6</div></div>
        </div>
        <div class="palette-swatch">
            <div class="swatch-color swatch-mint"></div>
            <div class="swatch-label">Mint Green<div class="swatch-hex">#c7f9cc</div></div>
        </div>
        <div class="palette-swatch">
            <div class="swatch-color swatch-lavender"></div>
            <div class="swatch-label">Lavender<div class="swatch-hex">#d4c1ec</div></div>
        </div>
        <div class="palette-swatch">
            <div class="swatch-color swatch-peach"></div>
            <div class="swatch-label">Peach<div class="swatch-hex">#f8c6a9</div></div>
        </div>
        <div class="palette-swatch">
            <div class="swatch-color swatch-sand"></div>
            <div class="swatch-label">Sand<div class="swatch-hex">#f2e5d7</div></div>
        </div>
    </div>
    <script src="../java scripts/script.js"></script>
</body>
</html>
